<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jake — Priority Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #f5f4f1; font-family: 'Inter', sans-serif; color: #1a1916; }
body { min-height: 100vh; padding-bottom: 80px; }
.page { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.5rem; }

/* HEADER */
.hd { margin-bottom: 2.5rem; }
.hd-eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #a09888; font-weight: 500; margin-bottom: 8px; }
.hd-title { font-size: 26px; font-weight: 700; color: #1a1916; letter-spacing: -0.02em; }
.hd-date { font-size: 13px; color: #9a9080; margin-top: 4px; }
.hd-divider { border: none; border-top: 1px solid #e4e0d8; margin-top: 1.5rem; }

/* TIER */
.tier-hd { display: flex; align-items: center; gap: 10px; margin: 2rem 0 1rem; flex-wrap: wrap; }
.tier-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.t1 .tier-badge { background: #fde8e6; color: #b83020; }
.t2 .tier-badge { background: #fef2e0; color: #b85e08; }
.t3 .tier-badge { background: #e8f0fc; color: #1a4e96; }
.tier-desc { font-size: 13px; color: #9a9080; }

/* CARD */
.card { background: #fff; border: 1px solid #e4e0d8; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.card-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px; cursor: pointer; }
.card-header:hover { background: #faf9f7; }
.card-stripe { width: 3px; height: 44px; border-radius: 2px; flex-shrink: 0; }
.stripe-red { background: #d94030; }
.stripe-amber { background: #c06010; }
.stripe-blue { background: #2056c0; }
.stripe-green { background: #286644; }
.card-main { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 600; color: #1a1916; }
.card-why { font-size: 13px; color: #7a7468; margin-top: 3px; line-height: 1.45; }
.ring-wrap { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.ring-pct { font-size: 11px; font-weight: 600; color: #7a7468; }
svg.ring { transform: rotate(-90deg); }
.chev { font-size: 11px; color: #c0b8a8; flex-shrink: 0; transition: transform 0.2s; }
.card.open .chev { transform: rotate(180deg); }

/* BODY */
.card-body { display: none; border-top: 1px solid #f0ece4; }
.card.open .card-body { display: block; }

/* BLOCKER NOTICE */
.blocker-notice { background: #fef2e0; border-bottom: 1px solid #f0e0c0; padding: 10px 18px; font-size: 13px; color: #8a4a08; display: flex; align-items: center; gap: 8px; }
.blocker-notice strong { font-weight: 600; }

/* NEXT ACTION */
.next-wrap { padding: 14px 18px; background: #fffbf4; border-bottom: 1px solid #f0ece4; }
.next-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #b85e08; margin-bottom: 6px; }
.next-text { font-size: 14px; font-weight: 500; color: #1a1916; line-height: 1.5; outline: none; min-height: 20px; }
.next-text:empty::before { content: attr(data-ph); color: #c0b8a8; font-weight: 400; font-style: italic; }

/* STEPS */
.steps-wrap { padding: 14px 18px; border-bottom: 1px solid #f0ece4; }
.steps-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #a09888; margin-bottom: 10px; }
.step-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f5f2ee; }
.step-row:last-of-type { border-bottom: none; }
.step-cb { width: 18px; height: 18px; border: 1.5px solid #d4cec4; border-radius: 5px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; }
.step-cb.on { background: #286644; border-color: #286644; color: #fff; }
.step-label { font-size: 13px; color: #2a2820; flex: 1; line-height: 1.45; }
.step-label.done { text-decoration: line-through; color: #b0a898; }
.step-del { background: none; border: none; color: #d4cec4; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; flex-shrink: 0; }
.step-del:hover { color: #d94030; }
.add-step { display: flex; gap: 8px; margin-top: 10px; }
.add-step input { flex: 1; border: 1px solid #e4e0d8; border-radius: 7px; padding: 7px 10px; font-size: 13px; color: #1a1916; background: #faf9f7; font-family: inherit; }
.add-step input:focus { outline: none; border-color: #c06010; }
.add-step input::placeholder { color: #c0b8a8; }
.add-step button { background: #f5f2ee; border: 1px solid #e4e0d8; border-radius: 7px; padding: 7px 12px; font-size: 12px; font-weight: 500; color: #7a7468; cursor: pointer; font-family: inherit; white-space: nowrap; }
.add-step button:hover { border-color: #c06010; color: #c06010; }

/* NOTES */
.meta-wrap { padding: 14px 18px; display: flex; flex-direction: column; gap: 12px; }
.notes-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #a09888; margin-bottom: 6px; }
.notes-ta { width: 100%; border: 1px solid #e4e0d8; border-radius: 7px; padding: 9px 11px; font-size: 13px; color: #1a1916; background: #faf9f7; font-family: inherit; line-height: 1.6; min-height: 70px; resize: none; }
.notes-ta:focus { outline: none; border-color: #c06010; }
.notes-ta::placeholder { color: #c0b8a8; }
.meta-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.status-sel { border: 1px solid #e4e0d8; border-radius: 7px; padding: 6px 10px; font-size: 12px; color: #7a7468; background: #faf9f7; font-family: inherit; }
.save-row { display: flex; align-items: center; gap: 10px; }
.flash { font-size: 12px; color: #286644; display: none; }
.save-btn { background: #1a1916; color: #fff; border: none; border-radius: 7px; padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.save-btn:hover { background: #2e2c28; }
.date-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
.date-field { display: flex; flex-direction: column; gap: 4px; }
.date-field label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #a09888; }
.date-field input[type=date] { border: 1px solid #e4e0d8; border-radius: 7px; padding: 6px 10px; font-size: 13px; color: #1a1916; background: #faf9f7; font-family: inherit; }
.date-field input[type=date]:focus { outline: none; border-color: #c06010; }
.card-meta-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 5px; }
.card-status-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.st-notstarted { background: #f0ece4; color: #7a7468; }
.st-inprogress { background: #fef2e0; color: #b85e08; }
.st-blocked { background: #fde8e6; color: #b83020; }
.st-done { background: #edf6f1; color: #286644; }
.card-due { font-size: 11px; color: #7a7468; }
.card-due.overdue { color: #b83020; font-weight: 600; }
.card-updated { font-size: 11px; color: #b0a898; }
.card-updated.stale { color: #b83020; font-weight: 600; }

/* PROGRESS BAR */
.pbar-wrap { height: 3px; background: #f0ece4; }
.pbar-fill { height: 100%; transition: width 0.3s; }

/* FOOTER */
.foot { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e4e0d8; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
.foot-stat { font-size: 13px; color: #7a7468; }
.foot-stat strong { color: #1a1916; }
.foot-reset { font-size: 12px; color: #c0b8a8; background: none; border: none; cursor: pointer; font-family: inherit; }
.foot-reset:hover { color: #d94030; }

@media (max-width:580px) {
  .card-why { display: none; }
  .ring-wrap { display: none; }
}

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; padding: 1.5rem; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 1.75rem; width: 100%; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
.modal-title { font-size: 17px; font-weight: 700; color: #1a1916; margin-bottom: 1.25rem; }
.modal label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #a09888; display: block; margin-bottom: 5px; margin-top: 14px; }
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal textarea, .modal select { width: 100%; border: 1px solid #e4e0d8; border-radius: 7px; padding: 8px 11px; font-size: 14px; color: #1a1916; font-family: inherit; background: #faf9f7; }
.modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #c06010; }
.modal textarea { min-height: 70px; resize: none; line-height: 1.5; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
.modal-cancel { background: none; border: 1px solid #e4e0d8; border-radius: 7px; padding: 8px 16px; font-size: 13px; color: #7a7468; cursor: pointer; font-family: inherit; }
.modal-cancel:hover { border-color: #c0b8a8; }
.modal-confirm { background: #1a1916; color: #fff; border: none; border-radius: 7px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.modal-confirm:hover { background: #2e2c28; }
.add-project-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 13px 18px; background: none; border: 1.5px dashed #d4cec4; border-radius: 12px; font-size: 14px; font-weight: 500; color: #a09888; cursor: pointer; font-family: inherit; margin-top: 1rem; transition: all 0.15s; }
.add-project-btn:hover { border-color: #c06010; color: #c06010; background: #fffbf4; }
</style>
</head>
<body>
<div class="page">
  <div class="hd">
    <div class="hd-eyebrow">VP of Sales · Priority Tracker</div>
    <div class="hd-title">What to do. In order.</div>
    <div class="hd-date" id="datestr"></div>
    <hr class="hd-divider">
  </div>
  <div id="root"></div>
  <button class="add-project-btn" onclick="openModal()">+ Add new project</button>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Add new project</div>
    <label>Project name</label>
    <input type="text" id="m-name" placeholder="e.g. BJ's Restaurants Pitch">
    <label>Why it matters / what it unblocks</label>
    <input type="text" id="m-why" placeholder="e.g. $5M opportunity, stage 2 of 6 approval">
    <label>Tier</label>
    <select id="m-tier">
      <option value="1">Tier 1 — Do this now</option>
      <option value="2" selected>Tier 2 — Active, keep moving</option>
      <option value="3">Tier 3 — Scheduled / blocked</option>
    </select>
    <label>Priority color</label>
    <select id="m-stripe">
      <option value="stripe-red">🔴 Red — blocking / urgent</option>
      <option value="stripe-amber" selected>🟡 Amber — active</option>
      <option value="stripe-blue">🔵 Blue — scheduled</option>
      <option value="stripe-green">🟢 Green — healthy / done</option>
    </select>
    <label>Blocked by (optional)</label>
    <input type="text" id="m-blocked" placeholder="e.g. Coffee hire must be complete first">
    <label>Notes / context (optional)</label>
    <textarea id="m-notes" placeholder="Anything important to remember about this project..."></textarea>
    <label>Due date (optional)</label>
    <input type="date" id="m-due">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="addProject()">Add project</button>
    </div>
  </div>
</div>

<div class="foot">
  <div class="foot-stat">Overall: <strong id="ov-pct">—</strong> across <strong id="ov-count">—</strong> workstreams</div>
  <button class="foot-reset" onclick="resetAll()">↺ reset</button>
</div>

const TIER_META = {
  1:{ label:'Tier 1', desc:'Do these now — they unblock or compound everything else' },
  2:{ label:'Tier 2', desc:'Active work — keep these moving in parallel' },
  3:{ label:'Tier 3', desc:'Blocked or future — do not start until prerequisites are done' },
};

const STRIPE_COLORS = {
  'stripe-red':'#d94030',
  'stripe-amber':'#c06010',
  'stripe-blue':'#2056c0',
  'stripe-green':'#286644',
};

function load() {
  try { const d = JSON.parse(localStorage.getItem(KEY)); return d && d.length ? d : JSON.parse(JSON.stringify(DEFAULTS)); }
  catch { return JSON.parse(JSON.stringify(DEFAULTS)); }
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

let state = load();
let openCards = new Set();

(function(){
  const n = new Date();
  const D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('datestr').textContent = `${D[n.getDay()]}, ${M[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
})();

function stepsDone(ws) { return ws.steps.filter(s=>s.done).length; }
function stepsTotal(ws) { return ws.steps.length; }
function pct(ws) { return stepsTotal(ws) ? Math.round(stepsDone(ws)/stepsTotal(ws)*100) : 0; }

function ring(p, color) {
  const r = 16, c = 2*Math.PI*r, fill = (p/100)*c;
  return `<svg class="ring" width="40" height="40" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="${r}" fill="none" stroke="#f0ece4" stroke-width="3"/>
    <circle cx="20" cy="20" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-dasharray="${fill} ${c}" stroke-linecap="round"/>
  </svg>`;
}

function render() {
  const root = document.getElementById('root');
  let html = '';
  [1,2,3].forEach(tier => {
    const items = state.filter(w=>w.tier===tier);
    if (!items.length) return;
    const m = TIER_META[tier];
    html += `<div class="tier-hd t${tier}"><span class="tier-badge">${m.label}</span><span class="tier-desc">${m.desc}</span></div>`;
    items.forEach(ws => {
      const p = pct(ws);
      const col = STRIPE_COLORS[ws.stripe] || '#999';
      const isOpen = openCards.has(ws.id);
      html += `
<div class="card${isOpen?' open':''}" id="card-${ws.id}">
  <div class="card-header" onclick="toggle('${ws.id}')">
    <div class="card-stripe ${ws.stripe}"></div>
    <div class="card-main">
      <div class="card-name">${ws.name}</div>
      <div class="card-why">${ws.why}</div>
      <div class="card-meta-row">
        <span class="card-status-badge st-${statusKey(ws.status)}">${statusLabel(ws.status)}</span>
        ${ws.dueDate ? `<span class="card-due${isDueOverdue(ws.dueDate)?' overdue':''}">Due ${formatDate(ws.dueDate)}${isDueOverdue(ws.dueDate)?' ⚠':''}  </span>` : ''}
        ${ws.lastUpdated ? `<span class="card-updated${isDaysStale(ws.lastUpdated,7)?' stale':''}">Updated ${daysAgo(ws.lastUpdated)}${isDaysStale(ws.lastUpdated,7)?' — stale':''}</span>` : ''}
      </div>
    </div>
    <div class="ring-wrap">${ring(p,col)}<div class="ring-pct">${p}%</div></div>
    <div class="chev">▼</div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" style="width:${p}%;background:${col}"></div></div>
  <div class="card-body">
    ${ws.blockedBy ? `<div class="blocker-notice">⛔ <strong>Blocked by:</strong> ${ws.blockedBy}</div>` : ''}
    <div class="next-wrap">
      <div class="next-label">▸ Next action</div>
      <div class="next-text" id="na-${ws.id}" contenteditable="true" data-ph="What's the very next physical action?">${ws.nextAction}</div>
    </div>
    <div class="steps-wrap">
      <div class="steps-label">Steps — ${stepsDone(ws)} of ${stepsTotal(ws)} done</div>
      ${ws.steps.map(s=>`
        <div class="step-row">
          <div class="step-cb${s.done?' on':''}" onclick="toggleStep('${ws.id}','${s.id}')">${s.done?'✓':''}</div>
          <div class="step-label${s.done?' done':''}">${s.text}</div>
          <button class="step-del" onclick="delStep('${ws.id}','${s.id}')">✕</button>
        </div>`).join('')}
      <div class="add-step">
        <input type="text" id="si-${ws.id}" placeholder="Add a step..." onkeydown="if(event.key==='Enter')addStep('${ws.id}')">
        <button onclick="addStep('${ws.id}')">+ Add</button>
      </div>
    </div>
    <div class="meta-wrap">
      <div>
        <div class="notes-label">Notes & context</div>
        <textarea class="notes-ta" id="nt-${ws.id}" placeholder="Blockers, context, things to remember...">${ws.notes}</textarea>
      </div>
      <div class="meta-bottom">
        <select class="status-sel" id="st-${ws.id}">
          <option value="notstarted" ${(ws.status==='notstarted'||ws.status==='scheduled')?'selected':''}>⬜ Not started</option>
          <option value="inprogress" ${(ws.status==='inprogress'||ws.status==='active'||ws.status==='blocking')?'selected':''}>🟡 In progress</option>
          <option value="blocked" ${ws.status==='blocked'?'selected':''}>🔴 Blocked</option>
          <option value="done" ${ws.status==='done'?'selected':''}>🟢 Done</option>
        </select>
        <div class="date-row">
          <div class="date-field">
            <label>Due date</label>
            <input type="date" id="due-${ws.id}" value="${ws.dueDate||''}">
          </div>
        </div>
        <div class="save-row">
          <span class="flash" id="fl-${ws.id}">✓ Saved</span>
          <button class="save-btn" onclick="saveCard('${ws.id}')">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
    });
  });
  root.innerHTML = html;
  updateFoot();
}

function toggle(id) {
  if (openCards.has(id)) openCards.delete(id); else openCards.add(id);
  render();
}

function toggleStep(wsId, sId) {
  const ws = state.find(w=>w.id===wsId);
  const s = ws.steps.find(x=>x.id===sId);
  s.done = !s.done;
  const next = ws.steps.find(x=>!x.done);
  ws.nextAction = next ? next.text : '✓ All steps complete — mark this workstream as Done';
  save();
  openCards.add(wsId);
  render();
}

function delStep(wsId, sId) {
  const ws = state.find(w=>w.id===wsId);
  ws.steps = ws.steps.filter(x=>x.id!==sId);
  save(); openCards.add(wsId); render();
}

function addStep(wsId) {
  const inp = document.getElementById('si-'+wsId);
  const t = inp.value.trim(); if (!t) return;
  const ws = state.find(w=>w.id===wsId);
  ws.steps.push({id:'u'+Date.now(), text:t, done:false});
  save(); openCards.add(wsId); render();
}

function statusKey(s) {
  if (s==='notstarted'||s==='scheduled') return 'notstarted';
  if (s==='inprogress'||s==='active'||s==='blocking') return 'inprogress';
  if (s==='blocked') return 'blocked';
  if (s==='done') return 'done';
  return 'notstarted';
}
function statusLabel(s) {
  const k = statusKey(s);
  return {notstarted:'Not started', inprogress:'In progress', blocked:'Blocked', done:'Done'}[k];
}
function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}`;
}
function isDueOverdue(d) {
  if (!d) return false;
  return new Date(d) < new Date();
}
function daysAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  return `${diff}d ago`;
}
function isDaysStale(ts, days) {
  return Math.floor((Date.now() - ts) / 86400000) >= days;
}

function saveCard(wsId) {
  const ws = state.find(w=>w.id===wsId);
  const na = document.getElementById('na-'+wsId);
  if (na) ws.nextAction = na.innerText.trim();
  const nt = document.getElementById('nt-'+wsId);
  if (nt) ws.notes = nt.value;
  const st = document.getElementById('st-'+wsId);
  if (st) ws.status = st.value;
  const due = document.getElementById('due-'+wsId);
  if (due) ws.dueDate = due.value || null;
  ws.lastUpdated = Date.now();
  save(); openCards.add(wsId); render();
  const fl = document.getElementById('fl-'+wsId);
  if (fl) { fl.style.display='inline'; setTimeout(()=>fl.style.display='none',2000); }
}

function updateFoot() {
  const total = state.reduce((a,w)=>a+pct(w),0);
  const avg = state.length ? Math.round(total/state.length) : 0;
  document.getElementById('ov-pct').textContent = avg+'%';
  document.getElementById('ov-count').textContent = state.length;
}

function resetAll() {
  if (confirm('Reset everything back to defaults?')) {
    localStorage.removeItem(KEY);
    state = JSON.parse(JSON.stringify(DEFAULTS));
    openCards.clear(); render();
  }
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 50);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  ['m-name','m-why','m-blocked','m-notes','m-due'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-tier').value = '2';
  document.getElementById('m-stripe').value = 'stripe-amber';
}
function addProject() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  const newProject = {
    id: 'p' + Date.now(),
    tier: parseInt(document.getElementById('m-tier').value),
    stripe: document.getElementById('m-stripe').value,
    name,
    why: document.getElementById('m-why').value.trim() || 'Added manually.',
    blockedBy: document.getElementById('m-blocked').value.trim() || null,
    nextAction: 'Define the first next action for this project',
    status: 'notstarted',
    notes: document.getElementById('m-notes').value.trim(),
    dueDate: document.getElementById('m-due').value || null,
    lastUpdated: Date.now(),
    steps: [],
  };
  state.push(newProject);
  save();
  closeModal();
  openCards.add(newProject.id);
  render();
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
});

render();
</script>
</body>
</html>
